<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="db.js"></script> 
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<!-- ── MENU SCREEN ── -->
<div id="app">
  <div class="stars" aria-hidden="true"></div>

  <header class="top">
    <img src="img/logo.png" class="logo" alt="Logo" onerror="this.style.display='none'">
    <h1 class="title">FLYING KOLODIN 🪰</h1>
    <p class="subtitle">Летающий Колодин! Играй, побеждай, выходи в топ </p>
  </header>

  <div class="card">
    <div class="balance-wrap">
      <div class="coin">🪙</div>
      <div>
        <div class="balance-label">Монеты</div>
        <div id="balance" class="balance-value">0</div>
      </div>
    </div>
    <button id="playBtn" class="btn-play">
      <span>▶ Начать игру</span>
    </button>
  </div>

  <div class="leaderboard-wrap">
    <h2 class="lb-title">🏆 Лидерборд</h2>
    <ul id="leaderboard" class="lb-list">
      <li class="lb-row"><span class="lb-rank gold">1</span><span class="lb-name">КОЛОДИН</span><span class="lb-score">1 ЛЯМ 🪙</span></li>
      <li class="lb-row"><span class="lb-rank silver">2</span><span class="lb-name">Player2</span><span class="lb-score">95 🪙</span></li>
      <li class="lb-row"><span class="lb-rank bronze">3</span><span class="lb-name">Player3</span><span class="lb-score">80 🪙</span></li>
    </ul>
  </div>
</div>

<!-- ── GAME CANVAS ── -->
<canvas id="gameCanvas"></canvas>

<!-- ── GAME OVER OVERLAY ── -->
<div id="gameOver" class="overlay hidden">
  <div class="over-card">
    <div class="over-emoji">💥</div>
    <h2>Игра окончена</h2>
    <p>Ваш счёт: <strong id="finalScore">0</strong></p>
    <p class="over-sub">+<span id="earned">0</span> 🪙 монет</p>
    <button id="retryBtn" class="btn-play">↩ Снова</button>
    <button id="menuBtn" class="btn-menu">Главное меню</button>
  </div>
</div>

<script src="telegram.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
</body>
</html>
